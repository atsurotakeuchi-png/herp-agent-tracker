<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERP 第二新卒 エージェント推薦トラッカー</title>
<style>
:root {
  --bg: #f7f8fa;
  --bg2: #ffffff;
  --bg3: #f0f1f5;
  --bg4: #e8eaf0;
  --border: #e2e5ed;
  --text: #1a1d2e;
  --text2: #5a5f72;
  --text3: #9299ad;
  --accent: #5b4cdb;
  --accent2: #7c6ff7;
  --accent-bg: rgba(91,76,219,.06);
  --green: #0ea47a;
  --green-bg: rgba(14,164,122,.08);
  --red: #dc3545;
  --red-bg: rgba(220,53,69,.07);
  --orange: #e6940a;
  --orange-bg: rgba(230,148,10,.08);
  --blue: #3182ce;
  --pink: #d63384;
  --teal: #0ea47a;
  --tier1: linear-gradient(135deg, #5b4cdb, #7c6ff7);
  --tier2: linear-gradient(135deg, #8892a4, #b0b8c8);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
  --shadow: 0 2px 8px rgba(0,0,0,.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.header-left h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.header-left .sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.badge-mock {
  background: var(--accent);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
}

.btn-sm {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 7px;
  cursor: pointer;
  transition: all .12s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn-sm:hover { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

/* Period Bar */
.period-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.preset-btn {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  transition: all .12s;
}

.preset-btn:hover { border-color: var(--accent); color: var(--accent); }

.preset-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.date-sep { color: var(--text3); font-size: 12px; margin: 0 4px; }

.date-input {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  background: var(--bg2);
  cursor: pointer;
}

.date-input:focus { outline: none; border-color: var(--accent); }

.period-info {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.period-info .change-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
}

.change-tag.up { background: var(--green-bg); color: var(--green); }
.change-tag.down { background: var(--red-bg); color: var(--red); }

.period-label {
  font-size: 11px;
  color: var(--text3);
}

.container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

/* Funnel Section */
.funnel-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}

.funnel-title {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
}

.funnel-flow {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}

.funnel-step {
  text-align: center;
  position: relative;
}

.funnel-step::after {
  content: '>';
  position: absolute;
  right: -8px;
  top: 46%;
  font-size: 11px;
  color: var(--text3);
  font-weight: 700;
}

.funnel-step:last-child::after { display: none; }

.funnel-bar-wrap {
  height: 48px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  margin-bottom: 8px;
}

.funnel-bar-actual {
  width: 26px;
  border-radius: 4px 4px 0 0;
  transition: height .4s;
}

.funnel-bar-target {
  width: 26px;
  border-radius: 4px 4px 0 0;
  border: 1.5px dashed var(--text3);
  background: transparent;
  transition: height .4s;
}

.funnel-step .step-label { font-size: 10px; color: var(--text3); font-weight: 600; }
.funnel-step .step-value { font-size: 22px; font-weight: 800; margin-top: 2px; color: var(--text); }
.funnel-step .step-rate { font-size: 10px; color: var(--text3); }
.funnel-step .step-target { font-size: 9px; color: var(--text3); margin-top: 2px; }
.funnel-step .step-change { font-size: 9px; font-weight: 700; margin-top: 1px; }
.funnel-step .step-change.up { color: var(--green); }
.funnel-step .step-change.down { color: var(--red); }

.legend {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text3); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }
.legend-dot.actual { background: var(--accent); }
.legend-dot.target { border: 1.5px dashed var(--text3); }

/* KPI Strip */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}

.kpi {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 14px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.kpi::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}

.kpi.s1::after { background: var(--accent); }
.kpi.s2::after { background: var(--blue); }
.kpi.s3::after { background: var(--green); }
.kpi.s4::after { background: var(--orange); }
.kpi.s5::after { background: var(--pink); }
.kpi.s6::after { background: var(--teal); }

.kpi-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }

.kpi-row { display: flex; align-items: baseline; gap: 4px; margin-top: 4px; }
.kpi-val { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); }
.kpi-unit { font-size: 12px; color: var(--text3); }

.kpi-target { font-size: 10px; color: var(--text3); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.kpi-progress { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.kpi-progress-fill { height: 100%; border-radius: 2px; transition: width .4s; }

.kpi-change { font-size: 10px; font-weight: 700; margin-top: 2px; }
.kpi-change.up { color: var(--green); }
.kpi-change.down { color: var(--red); }

/* Tier Section */
.tier-section { margin-bottom: 20px; }

.tier-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.tier-badge {
  font-size: 11px;
  font-weight: 800;
  padding: 3px 12px;
  border-radius: 14px;
  color: white;
  letter-spacing: 1px;
}

.tier-badge.t1 { background: var(--tier1); }
.tier-badge.t2 { background: var(--tier2); }

.tier-criteria { font-size: 11px; color: var(--text3); background: var(--bg3); padding: 3px 10px; border-radius: 10px; }
.tier-summary { font-size: 11px; color: var(--text2); margin-left: auto; }

/* Table */
.data-table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }

.data-table th {
  background: var(--bg3);
  padding: 9px 12px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .4px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.data-table th.num { text-align: right; }

.data-table td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.data-table tbody tr { transition: background .08s; }
.data-table tbody tr:hover { background: var(--accent-bg); }
.data-table tbody tr:last-child td { border-bottom: none; }

.agent-name-cell { display: flex; align-items: center; gap: 8px; }

.agent-rank {
  width: 22px; height: 22px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
  color: white;
  flex-shrink: 0;
}

.agent-rank.r1 { background: var(--accent); }
.agent-rank.r2 { background: #6b5fd0; }
.agent-rank.r3 { background: #7b72c4; }
.agent-rank.r4 { background: #8b87b8; }
.agent-rank.r5 { background: #8892a4; }
.agent-rank.r6 { background: #8892a4; }
.agent-rank.r7 { background: #8892a4; }
.agent-rank.r8 { background: #8892a4; }

.agent-info .name { font-weight: 700; font-size: 13px; color: var(--text); }
.agent-info .contact { font-size: 10px; color: var(--text3); margin-top: 1px; }

.num-cell {
  text-align: right;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.num-cell .value { font-size: 15px; color: var(--text); }
.num-cell .rate { font-size: 10px; display: block; margin-top: 1px; }
.num-cell .rate.good { color: var(--green); }
.num-cell .rate.warn { color: var(--orange); }
.num-cell .rate.bad { color: var(--red); }

.target-vs-actual { display: flex; align-items: center; gap: 6px; }

.mini-progress {
  width: 48px; height: 5px;
  background: var(--bg4);
  border-radius: 3px;
  overflow: hidden;
}

.mini-progress-fill { height: 100%; border-radius: 3px; }

.target-pct { font-size: 10px; font-weight: 700; min-width: 32px; text-align: right; }

.move-btn {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text3);
  cursor: pointer;
  transition: all .12s;
}

.move-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Target Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,.3);
  backdrop-filter: blur(2px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 660px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,.12);
}

.modal h2 { font-size: 16px; margin-bottom: 4px; color: var(--text); }
.modal .modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 18px; }

.modal-grid {
  display: grid;
  grid-template-columns: 1fr repeat(6, 68px);
  gap: 1px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 18px;
}

.modal-grid .cell { background: var(--bg2); padding: 8px 8px; font-size: 11px; }
.modal-grid .cell.header { background: var(--bg3); font-weight: 700; color: var(--text3); text-align: center; font-size: 10px; }
.modal-grid .cell.label { font-weight: 600; color: var(--text); }

.modal-grid input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  padding: 4px 6px;
  font-size: 12px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.modal-grid input:focus { outline: none; border-color: var(--accent); background: white; }

.modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

.modal-actions button {
  padding: 8px 20px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .12s;
}

.btn-cancel { background: var(--bg3); color: var(--text2); }
.btn-cancel:hover { background: var(--bg4); }
.btn-save { background: var(--accent); color: white; }
.btn-save:hover { opacity: .9; }

/* Login Screen */
.login-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-overlay.hidden { display: none; }

.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 36px;
  width: 360px;
  box-shadow: var(--shadow);
  text-align: center;
}

.login-box h2 { font-size: 18px; margin-bottom: 4px; }
.login-box .login-sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }

.login-box input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 12px;
  background: var(--bg3);
  color: var(--text);
}

.login-box input:focus { outline: none; border-color: var(--accent); background: white; }

.login-box button {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.login-box button:hover { opacity: .9; }

.login-error {
  color: var(--red);
  font-size: 12px;
  margin-top: 8px;
  display: none;
}

/* Sync button */
.btn-sync {
  background: var(--green);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all .12s;
}

.btn-sync:hover { opacity: .85; }
.btn-sync:disabled { opacity: .5; cursor: not-allowed; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text2); }
.empty-state p { font-size: 13px; margin-bottom: 16px; }

.empty-state button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* Requisition Modal */
.req-list {
  max-height: 50vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 18px;
}

.req-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  transition: background .08s;
}

.req-item:last-child { border-bottom: none; }
.req-item:hover { background: var(--accent-bg); }

.req-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.req-item .req-name { flex: 1; font-weight: 600; color: var(--text); }
.req-item .req-archived { font-size: 10px; color: var(--text3); background: var(--bg3); padding: 2px 6px; border-radius: 4px; }

.req-summary {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.req-summary .count { font-weight: 700; color: var(--accent); }

.req-filter {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 10px;
  background: var(--bg3);
  color: var(--text);
}

.req-filter:focus { outline: none; border-color: var(--accent); background: white; }

@media (max-width: 900px) {
  .kpi-strip { grid-template-columns: repeat(3, 1fr); }
  .funnel-flow { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>HERP Agent Tracker</h2>
    <div class="login-sub">株式会社ブルード 採用チーム</div>
    <input type="password" id="loginPassword" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが正しくありません</div>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <h1>HERP 第二新卒 エージェント推薦トラッカー</h1>
    <div class="sub">株式会社ブルード 採用チーム</div>
  </div>
  <div class="header-right">
    <button class="btn-sync" id="syncBtn" onclick="doSync()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      HERP同期
    </button>
    <button class="btn-sm" onclick="openReqModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
      求人選択
    </button>
    <button class="btn-sm" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      目標設定
    </button>
  </div>
</div>

<!-- Period Bar: Presets + Custom Range -->
<div class="period-bar">
  <button class="preset-btn active" onclick="setPreset('today',this)">本日</button>
  <button class="preset-btn" onclick="setPreset('week',this)">1週間</button>
  <button class="preset-btn" onclick="setPreset('month',this)">1ヶ月</button>
  <button class="preset-btn" onclick="setPreset('quarter',this)">3ヶ月</button>
  <span class="date-sep">|</span>
  <input type="date" class="date-input" id="dateFrom" onchange="onCustomRange()">
  <span class="date-sep">~</span>
  <input type="date" class="date-input" id="dateTo" onchange="onCustomRange()">
  <div class="period-info">
    <span class="period-label" id="periodLabel"></span>
    <span class="change-tag up" id="periodChange"></span>
  </div>
</div>

<div class="container">
  <div class="funnel-section" id="globalFunnel"></div>
  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="tier-section" id="tier1Section"></div>
  <div class="tier-section" id="tier2Section"></div>
</div>

<!-- Target Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>月次目標設定</h2>
    <div class="modal-sub">2026年4月の全体目標を入力。保存後、各期間の目標に自動配分されます。</div>
    <div class="modal-grid">
      <div class="cell header">ステージ</div>
      <div class="cell header">推薦数</div>
      <div class="cell header">1次面接</div>
      <div class="cell header">2次面接</div>
      <div class="cell header">最終面接</div>
      <div class="cell header">内定</div>
      <div class="cell header">内定承諾</div>
      <div class="cell label">目標数</div>
      <div class="cell"><input type="number" value="120" id="t_rec"></div>
      <div class="cell"><input type="number" value="30" id="t_i1"></div>
      <div class="cell"><input type="number" value="15" id="t_i2"></div>
      <div class="cell"><input type="number" value="8" id="t_i3"></div>
      <div class="cell"><input type="number" value="5" id="t_offer"></div>
      <div class="cell"><input type="number" value="4" id="t_accept"></div>
      <div class="cell label">通過率目標</div>
      <div class="cell" style="text-align:center;color:var(--text3)">-</div>
      <div class="cell"><input type="number" value="25" id="t_r1">%</div>
      <div class="cell"><input type="number" value="50" id="t_r2">%</div>
      <div class="cell"><input type="number" value="53" id="t_r3">%</div>
      <div class="cell"><input type="number" value="63" id="t_r4">%</div>
      <div class="cell"><input type="number" value="80" id="t_r5">%</div>
      <div class="cell label" style="color:var(--text3)">前月実績</div>
      <div class="cell" style="color:var(--text3);text-align:right">105件</div>
      <div class="cell" style="color:var(--text3);text-align:right">25件</div>
      <div class="cell" style="color:var(--text3);text-align:right">11件</div>
      <div class="cell" style="color:var(--text3);text-align:right">6件</div>
      <div class="cell" style="color:var(--text3);text-align:right">3件</div>
      <div class="cell" style="color:var(--text3);text-align:right">2件</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveTargets()">保存して反映</button>
    </div>
  </div>
</div>

<!-- Requisition Modal -->
<div class="modal-overlay" id="reqModalOverlay">
  <div class="modal" style="width:560px">
    <h2>求人選択（データ取得対象）</h2>
    <div class="modal-sub">チェックした求人のみ同期対象になります。変更後はHERP同期を実行してください。</div>
    <div class="req-summary">
      選択中: <span class="count" id="reqCount">0</span>件 / <span id="reqTotal">0</span>件
      <button class="btn-sm" onclick="toggleAllReqs(true)" style="margin-left:auto;font-size:11px;padding:3px 8px">全選択</button>
      <button class="btn-sm" onclick="toggleAllReqs(false)" style="font-size:11px;padding:3px 8px">全解除</button>
    </div>
    <input class="req-filter" type="text" placeholder="求人名で検索..." oninput="filterReqs(this.value)">
    <div class="req-list" id="reqList"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeReqModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const API_BASE = '';  // Same origin when served by FastAPI
let AUTH_TOKEN = localStorage.getItem('herp_token') || '';

// ===== AGENTS (loaded from API) =====
let AGENTS = [];

const STAGES = [
  { key:'rec',    label:'推薦数',   color:'var(--accent)' },
  { key:'i1',     label:'1次面接',  color:'var(--blue)' },
  { key:'i2',     label:'2次面接',  color:'var(--green)' },
  { key:'i3',     label:'最終面接', color:'var(--orange)' },
  { key:'offer',  label:'内定',     color:'var(--pink)' },
  { key:'accept', label:'内定承諾', color:'var(--teal)' },
];

let MONTHLY_TARGETS = { rec:120, i1:30, i2:15, i3:8, offer:5, accept:4 };

// ===== UTILITIES =====
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }
function rateClass(r) { return r>=40?'good':r>=20?'warn':'bad'; }

// ===== API HELPERS =====
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type':'application/json' },
  };
  if (AUTH_TOKEN) opts.headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(`${API_BASE}${path}`, opts);
  if (resp.status === 401) {
    localStorage.removeItem('herp_token');
    AUTH_TOKEN = '';
    document.getElementById('loginOverlay').classList.remove('hidden');
    throw new Error('Unauthorized');
  }
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  return resp.json();
}

// ===== AUTH =====
async function doLogin() {
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  try {
    const data = await api('POST', '/api/auth/login', { password: pw });
    AUTH_TOKEN = data.token;
    localStorage.setItem('herp_token', AUTH_TOKEN);
    document.getElementById('loginOverlay').classList.add('hidden');
    errEl.style.display = 'none';
    init();
  } catch(e) {
    errEl.style.display = 'block';
  }
}

// ===== SYNC =====
async function doSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.textContent = '同期中...';
  try {
    const result = await api('POST', '/api/sync');
    btn.textContent = `完了 (${result.candidacies || 0}件)`;
    setTimeout(() => { btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg> HERP同期'; btn.disabled = false; }, 3000);
    await loadAgents();
    await renderAll();
  } catch(e) {
    btn.textContent = 'エラー';
    btn.disabled = false;
  }
}

// ===== DATA LOADING =====
async function loadAgents() {
  try {
    AGENTS = await api('GET', '/api/agents');
  } catch(e) {
    AGENTS = [];
  }
}

async function fetchFunnel(from, to) {
  try {
    return await api('GET', `/api/funnel?from=${from}&to=${to}`);
  } catch(e) {
    return { agents: {}, dayCount: 0, targets: null };
  }
}

function grandTotals(agentData) {
  const t = { rec:0, i1:0, i2:0, i3:0, offer:0, accept:0 };
  for (const a of Object.values(agentData)) {
    for (const k of Object.keys(t)) t[k] += (a[k] || 0);
  }
  return t;
}

function scaleTarget(dayCount) {
  const workdays = Math.max(1, Math.round(dayCount * 5 / 7));
  const ratio = workdays / 22;
  const t = {};
  for (const k of Object.keys(MONTHLY_TARGETS)) {
    t[k] = Math.max(1, Math.round(MONTHLY_TARGETS[k] * ratio));
  }
  return t;
}

// ===== STATE =====
let currentFrom, currentTo, prevFrom, prevTo;

function setDates(from, to, pFrom, pTo) {
  currentFrom = from;
  currentTo = to;
  prevFrom = pFrom;
  prevTo = pTo;
  document.getElementById('dateFrom').value = from;
  document.getElementById('dateTo').value = to;
  renderAll();
}

function setPreset(key, el) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const today = new Date();
  const fmt = d => formatDate(d);

  if (key === 'today') {
    const prev = new Date(today); prev.setDate(prev.getDate()-1);
    setDates(fmt(today), fmt(today), fmt(prev), fmt(prev));
  } else if (key === 'week') {
    const wA = new Date(today); wA.setDate(wA.getDate()-6);
    const pE = new Date(wA); pE.setDate(pE.getDate()-1);
    const pS = new Date(pE); pS.setDate(pS.getDate()-6);
    setDates(fmt(wA), fmt(today), fmt(pS), fmt(pE));
  } else if (key === 'month') {
    const mA = new Date(today); mA.setDate(mA.getDate()-29);
    const pE = new Date(mA); pE.setDate(pE.getDate()-1);
    const pS = new Date(pE); pS.setDate(pS.getDate()-29);
    setDates(fmt(mA), fmt(today), fmt(pS), fmt(pE));
  } else if (key === 'quarter') {
    const qA = new Date(today); qA.setDate(qA.getDate()-89);
    setDates(fmt(qA), fmt(today), null, null);
  }
}

function onCustomRange() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  if (!from || !to) return;
  const f = new Date(from), t2 = new Date(to);
  const span = Math.round((t2-f)/86400000);
  const pTo = new Date(f); pTo.setDate(pTo.getDate()-1);
  const pFrom = new Date(pTo); pFrom.setDate(pFrom.getDate()-span);
  currentFrom = from; currentTo = to;
  prevFrom = formatDate(pFrom); prevTo = formatDate(pTo);
  renderAll();
}

// ===== RENDER =====
async function renderAll() {
  const curr = await fetchFunnel(currentFrom, currentTo);
  const t = grandTotals(curr.agents);
  const tgt = curr.targets || scaleTarget(curr.dayCount || 1);

  let pt = null;
  if (prevFrom && prevTo) {
    const prev = await fetchFunnel(prevFrom, prevTo);
    pt = grandTotals(prev.agents);
  }

  // Empty state check
  const totalAll = t.rec + t.i1 + t.i2 + t.i3 + t.offer + t.accept;
  if (AGENTS.length === 0 || totalAll === 0) {
    document.getElementById('globalFunnel').innerHTML = `
      <div class="empty-state">
        <h3>データがありません</h3>
        <p>「HERP同期」ボタンでHERPからデータを取得してください。</p>
        <button onclick="doSync()">HERP同期を実行</button>
      </div>`;
    document.getElementById('kpiStrip').innerHTML = '';
    document.getElementById('tier1Section').innerHTML = '';
    document.getElementById('tier2Section').innerHTML = '';
    return;
  }

  // Period info
  const periodEl = document.getElementById('periodLabel');
  periodEl.textContent = `${currentFrom} ~ ${currentTo}（${curr.dayCount || 0}日間）`;
  const changeEl = document.getElementById('periodChange');
  if (pt) {
    const diff = t.rec - pt.rec;
    changeEl.textContent = `推薦数 前期比 ${diff>=0?'+':''}${diff}`;
    changeEl.className = `change-tag ${diff>=0?'up':'down'}`;
    changeEl.style.display = '';
  } else {
    changeEl.style.display = 'none';
  }

  // Funnel
  const maxVal = Math.max(t.rec, tgt.rec, 1);
  let fhtml = `<div class="funnel-title">全体ファネル（実績 vs 目標）</div><div class="funnel-flow">`;
  STAGES.forEach((s,i) => {
    const val = t[s.key]||0, target = tgt[s.key]||0;
    const rate = i>0 ? pct(val, t[STAGES[i-1].key]) : null;
    const bH = Math.max(6,(val/maxVal)*48), tH = Math.max(6,(target/maxVal)*48);
    const prevVal = pt?pt[s.key]:null;
    const diff = prevVal!==null?val-prevVal:null;
    const cls = diff>0?'up':diff<0?'down':'';
    const dStr = diff!==null?(diff>0?`+${diff}`:`${diff}`):'';
    fhtml += `<div class="funnel-step">
      <div class="funnel-bar-wrap">
        <div class="funnel-bar-actual" style="height:${bH}px;background:${s.color}"></div>
        <div class="funnel-bar-target" style="height:${tH}px"></div>
      </div>
      <div class="step-label">${s.label}</div>
      <div class="step-value">${val}</div>
      ${rate!==null?`<div class="step-rate">通過率 ${rate}%</div>`:''}
      <div class="step-target">目標 ${target}</div>
      ${dStr?`<div class="step-change ${cls}">前期比 ${dStr}</div>`:''}
    </div>`;
  });
  fhtml += `</div><div class="legend"><div class="legend-item"><div class="legend-dot actual"></div>実績</div><div class="legend-item"><div class="legend-dot target"></div>目標</div></div>`;
  document.getElementById('globalFunnel').innerHTML = fhtml;

  // KPIs
  let khtml = '';
  STAGES.forEach((s,i) => {
    const val = t[s.key]||0, target = tgt[s.key]||0;
    const p = pct(val,target), pF = Math.min(p,100);
    const fC = p>=80?'var(--green)':p>=50?'var(--orange)':'var(--red)';
    const prevVal = pt?pt[s.key]:null;
    const diff = prevVal!==null?val-prevVal:null;
    khtml += `<div class="kpi s${i+1}">
      <div class="kpi-label">${s.label}</div>
      <div class="kpi-row"><span class="kpi-val">${val}</span><span class="kpi-unit">/ ${target}</span></div>
      <div class="kpi-target">達成率 ${p}%<div class="kpi-progress"><div class="kpi-progress-fill" style="width:${pF}%;background:${fC}"></div></div></div>
      ${diff!==null?`<div class="kpi-change ${diff>=0?'up':'down'}">前期比 ${diff>=0?'+':''}${diff}</div>`:''}
    </div>`;
  });
  document.getElementById('kpiStrip').innerHTML = khtml;

  renderTier(1, curr, tgt);
  renderTier(2, curr, tgt);
}

function renderTier(tier, curr, tgt) {
  // Filter: only agents with rec > 0 in current period
  const agents = AGENTS.filter(a => a.tier === tier && ((curr.agents[String(a.id)]||{}).rec || 0) > 0);
  const sId = tier===1?'tier1Section':'tier2Section';
  const bCls = tier===1?'t1':'t2';
  const label = tier===1?'一軍':'二軍';
  const criteria = tier===1?'週5件以上 or 書類通過率40%以上':'週5件未満 and 書類通過率40%未満';

  let tierT = {rec:0,i1:0,i2:0,i3:0,offer:0,accept:0};
  agents.forEach(a => {
    const ad = curr.agents[String(a.id)] || {rec:0,i1:0,i2:0,i3:0,offer:0,accept:0};
    for (const k of Object.keys(tierT)) tierT[k] += (ad[k]||0);
  });

  if (agents.length === 0) { document.getElementById(sId).innerHTML = ''; return; }

  let html = `
    <div class="tier-head">
      <span class="tier-badge ${bCls}">${label}</span>
      <span class="tier-criteria">${criteria}</span>
      <span class="tier-summary">${agents.length}社 | 推薦 ${tierT.rec}件 | 内定 ${tierT.offer}件</span>
    </div>
    <div class="data-table-wrap"><table class="data-table">
    <thead><tr>
      <th style="width:28px">#</th><th>エージェント</th>
      <th class="num">推薦数</th><th class="num">1次面接</th><th class="num">2次面接</th>
      <th class="num">最終面接</th><th class="num">内定</th><th class="num">内定承諾</th>
      <th class="num">目標達成</th><th style="width:50px"></th>
    </tr></thead><tbody>`;

  const totalRec = Object.values(curr.agents).reduce((s,a) => s+(a.rec||0), 0) || 1;

  agents.forEach((agent, idx) => {
    const ad = curr.agents[String(agent.id)] || {rec:0,i1:0,i2:0,i3:0,offer:0,accept:0};
    const gi = AGENTS.indexOf(agent)+1;
    const share = (ad.rec||0)/totalRec;
    const agentTgt = Math.round((tgt.rec||0)*share)||0;
    const aPct = agentTgt?pct(ad.rec,agentTgt):(ad.rec>0?100:0);
    const aC = aPct>=80?'var(--green)':aPct>=50?'var(--orange)':'var(--red)';

    html += `<tr>
      <td><div class="agent-rank r${Math.min(gi,8)}">${gi}</div></td>
      <td><div class="agent-name-cell"><div class="agent-info"><div class="name">${agent.name}</div><div class="contact">RA: ${agent.contact||''}</div></div></div></td>`;

    ['rec','i1','i2','i3','offer','accept'].forEach((k,si) => {
      const val = ad[k]||0;
      const prev = si>0?['rec','i1','i2','i3','offer','accept'][si-1]:null;
      const rate = prev && (ad[prev]||0)>0 ? pct(val, ad[prev]) : (si>0?0:null);
      html += `<td class="num-cell"><span class="value">${val}</span>${rate!==null?`<span class="rate ${rateClass(rate)}">${rate}%</span>`:''}</td>`;
    });

    html += `<td class="num-cell"><div class="target-vs-actual"><div class="mini-progress"><div class="mini-progress-fill" style="width:${Math.min(aPct,100)}%;background:${aC}"></div></div><span class="target-pct" style="color:${aC}">${aPct}%</span></div></td>
      <td><button class="move-btn" onclick="toggleTier(${agent.id},${tier===1?2:1})">${tier===1?'二軍':'一軍'}へ</button></td></tr>`;
  });

  html += `</tbody></table></div>`;
  document.getElementById(sId).innerHTML = html;
}

async function toggleTier(agentId, newTier) {
  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;
  await api('POST', '/api/agents', { name: agent.name, contact: agent.contact, tier: newTier, herp_source: agent.herp_source||'' });
  agent.tier = newTier;
  renderAll();
}

function openModal() { document.getElementById('modalOverlay').classList.add('show'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

async function saveTargets() {
  const g = id => parseInt(document.getElementById(id).value)||0;
  const t = { rec:g('t_rec'), i1:g('t_i1'), i2:g('t_i2'), i3:g('t_i3'), offer:g('t_offer'), accept:g('t_accept') };
  MONTHLY_TARGETS = t;
  const ym = currentFrom ? currentFrom.slice(0,7) : formatDate(new Date()).slice(0,7);
  try {
    await api('POST', '/api/targets', { year_month: ym, ...t });
  } catch(e) { /* ignore if API not available */ }
  closeModal();
  renderAll();
}

// ===== REQUISITION MODAL =====
let REQUISITIONS = [];

async function loadRequisitions() {
  try { REQUISITIONS = await api('GET', '/api/requisitions'); } catch(e) { REQUISITIONS = []; }
}

function renderReqList(filter = '') {
  const list = document.getElementById('reqList');
  const lower = filter.toLowerCase();
  const filtered = filter ? REQUISITIONS.filter(r => r.name.toLowerCase().includes(lower)) : REQUISITIONS;

  let html = '';
  filtered.forEach(r => {
    html += `<div class="req-item">
      <input type="checkbox" ${r.enabled ? 'checked' : ''} onchange="toggleReq('${r.id}', this.checked)">
      <span class="req-name">${r.name || '(無題)'}</span>
      ${r.is_archived ? '<span class="req-archived">アーカイブ</span>' : ''}
    </div>`;
  });
  list.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text3)">求人が見つかりません。先にHERP同期を実行してください。</div>';
  updateReqCount();
}

function updateReqCount() {
  document.getElementById('reqCount').textContent = REQUISITIONS.filter(r => r.enabled).length;
  document.getElementById('reqTotal').textContent = REQUISITIONS.length;
}

async function toggleReq(id, enabled) {
  const r = REQUISITIONS.find(x => x.id === id);
  if (r) r.enabled = enabled ? 1 : 0;
  updateReqCount();
  try { await api('POST', '/api/requisitions/toggle', { id, enabled: enabled ? 1 : 0 }); } catch(e) {}
}

function toggleAllReqs(enable) {
  REQUISITIONS.forEach(r => r.enabled = enable ? 1 : 0);
  renderReqList(document.querySelector('.req-filter')?.value || '');
  REQUISITIONS.forEach(r => {
    api('POST', '/api/requisitions/toggle', { id: r.id, enabled: r.enabled }).catch(() => {});
  });
}

function filterReqs(val) { renderReqList(val); }

async function openReqModal() {
  await loadRequisitions();
  renderReqList();
  document.getElementById('reqModalOverlay').classList.add('show');
}

function closeReqModal() {
  document.getElementById('reqModalOverlay').classList.remove('show');
  renderAll();  // Re-render with updated requisition filter
}

// ===== INIT =====
async function init() {
  await loadAgents();
  const today = formatDate(new Date());
  document.getElementById('dateFrom').value = today;
  document.getElementById('dateTo').value = today;
  currentFrom = today; currentTo = today;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  prevFrom = formatDate(yesterday); prevTo = formatDate(yesterday);
  await renderAll();
}

// Check if already authenticated
if (AUTH_TOKEN) {
  document.getElementById('loginOverlay').classList.add('hidden');
  init();
}
</script>
</body>
</html>
